# Trove quickstart for Proxmox — the server plus a Proxmox agent that watches
# your PVE cluster, using the published images. No cloning or building required.
# Set TROVE_VERSION in .env to pin both services to one release or preview tag.
#
#   1. Create a read-only Proxmox API token (PVEAuditor role). See:
#        https://github.com/techdox/trove/blob/main/docs/agents/proxmox.md
#   2. Save a Trove token and your Proxmox connection details to .env (Compose
#      loads .env automatically and it persists across restarts/upgrades):
#        umask 077
#        {
#          echo "TROVE_TOKEN=trove_$(openssl rand -hex 24)"
#          echo "TROVE_PROXMOX_URL=https://YOUR-PVE-HOST:8006"
#          echo "TROVE_PROXMOX_TOKEN=trove@pve!trove-agent=YOUR-TOKEN-SECRET"
#        } > .env
#      then edit .env to fill in your real PVE host and API token.
#      Note: TROVE_TOKEN (Trove's own agent token) and TROVE_PROXMOX_TOKEN
#      (your Proxmox API token) are two different credentials.
#   3. Start the stack:
#        docker compose -f docker-compose.proxmox.yml up -d
#   4. Open http://localhost:8080 — your VMs and LXCs appear within ~30s.
#      Watch the agent while it connects:  docker compose logs -f agent
#
# To watch OTHER hosts/platforms too, mint each its own token on the server
# and add its agent (see the per-platform guides):
#        docker compose exec server trove-server agent create <name>
#
# ⚠ The dashboard is open unless you configure OIDC — keep port 8080 on a trusted
#   network (LAN/VPN), enable TROVE_OIDC_*, or put it behind auth.

services:
  server:
    image: ghcr.io/techdox/trove-server:${TROVE_VERSION:-latest}
    environment:
      TROVE_BOOTSTRAP_AGENT: "proxmox"
      TROVE_BOOTSTRAP_TOKEN: "${TROVE_TOKEN:?generate one first with a restrictive umask; see the file header}"
    ports:
      - "8080:8080"
    volumes:
      - trove-data:/data
    restart: unless-stopped

  agent:
    # The Proxmox agent — NOT trove-agent-docker. It reads the PVE API only;
    # it needs no Docker socket.
    image: ghcr.io/techdox/trove-agent-proxmox:${TROVE_VERSION:-latest}
    environment:
      TROVE_SERVER_URL: "http://server:8080"
      TROVE_TOKEN: "${TROVE_TOKEN}"
      TROVE_PROXMOX_URL: "${TROVE_PROXMOX_URL:?set your Proxmox API URL, e.g. https://192.168.1.10:8006}"
      TROVE_PROXMOX_TOKEN: "${TROVE_PROXMOX_TOKEN:?set your Proxmox API token in the form USER@REALM!TOKENID=SECRET}"
      # TLS verification is enabled by default. For Proxmox's private CA,
      # uncomment this and the read-only volume below after copying
      # /etc/pve/pve-root-ca.pem from a PVE node into this directory.
      # TROVE_PROXMOX_CA_FILE: "/etc/trove/pve-root-ca.pem"
    # volumes:
    #   - "./pve-root-ca.pem:/etc/trove/pve-root-ca.pem:ro"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  trove-data:
