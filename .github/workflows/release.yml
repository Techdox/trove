name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub release
  packages: write # push images to GHCR
  id-token: write # keyless GitHub artifact attestations
  attestations: write # store provenance for archives and OCI images

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Check for an already-published release
        id: existing_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          version="${TAG#v}"
          expected_assets=(
            "checksums.txt"
            "digests.txt"
            "trove-agent-docker_${version}_linux_amd64.tar.gz"
            "trove-agent-docker_${version}_linux_amd64.tar.gz.sbom.spdx.json"
            "trove-agent-docker_${version}_linux_arm64.tar.gz"
            "trove-agent-docker_${version}_linux_arm64.tar.gz.sbom.spdx.json"
            "trove-agent-k8s_${version}_linux_amd64.tar.gz"
            "trove-agent-k8s_${version}_linux_amd64.tar.gz.sbom.spdx.json"
            "trove-agent-k8s_${version}_linux_arm64.tar.gz"
            "trove-agent-k8s_${version}_linux_arm64.tar.gz.sbom.spdx.json"
            "trove-agent-local_${version}_linux_amd64.tar.gz"
            "trove-agent-local_${version}_linux_amd64.tar.gz.sbom.spdx.json"
            "trove-agent-local_${version}_linux_arm64.tar.gz"
            "trove-agent-local_${version}_linux_arm64.tar.gz.sbom.spdx.json"
            "trove-agent-proxmox_${version}_linux_amd64.tar.gz"
            "trove-agent-proxmox_${version}_linux_amd64.tar.gz.sbom.spdx.json"
            "trove-agent-proxmox_${version}_linux_arm64.tar.gz"
            "trove-agent-proxmox_${version}_linux_arm64.tar.gz.sbom.spdx.json"
            "trove-server_${version}_linux_amd64.tar.gz"
            "trove-server_${version}_linux_amd64.tar.gz.sbom.spdx.json"
            "trove-server_${version}_linux_arm64.tar.gz"
            "trove-server_${version}_linux_arm64.tar.gz.sbom.spdx.json"
          )
          printf '%s\n' "${expected_assets[@]}" > "$RUNNER_TEMP/trove-expected-release-assets.txt"

          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' > /tmp/trove-release-assets.txt 2>/tmp/trove-release-check.err; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          missing=0
          for asset in "${expected_assets[@]}"; do
            if ! grep -Fxq "$asset" /tmp/trove-release-assets.txt; then
              echo "::error::Existing release $TAG is missing expected asset: $asset"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "::error::Release $TAG already exists but is incomplete. Refusing to overwrite it automatically."
            exit 1
          fi

          echo "Release $TAG already exists with all expected assets; skipping GoReleaser publish."
          echo "skip=true" >> "$GITHUB_OUTPUT"

      - name: Existing release is already complete
        if: steps.existing_release.outputs.skip == 'true'
        env:
          TAG: ${{ github.ref_name }}
        run: |
          printf '%s\n' "$TAG is already published; no duplicate release work needed."

      # actions/checkout@v7
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        if: steps.existing_release.outputs.skip != 'true'
        with:
          fetch-depth: 0 # goreleaser needs tags/history for the changelog
      # actions/setup-go@v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        if: steps.existing_release.outputs.skip != 'true'
        with:
          go-version-file: go.mod
          cache: true
      # docker/setup-qemu-action@v4
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8
        if: steps.existing_release.outputs.skip != 'true'
      # docker/setup-buildx-action@v4
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
        if: steps.existing_release.outputs.skip != 'true'
      - name: Log in to GHCR
        if: steps.existing_release.outputs.skip != 'true'
        # docker/login-action@v4
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Download Syft v1.44.0
        id: syft
        if: steps.existing_release.outputs.skip != 'true'
        # anchore/sbom-action@v0
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610
        with:
          syft-version: v1.44.0
      - name: Add Syft to PATH
        if: steps.existing_release.outputs.skip != 'true'
        env:
          SYFT_CMD: ${{ steps.syft.outputs.cmd }}
        run: |
          set -euo pipefail
          test -x "$SYFT_CMD"
          echo "${SYFT_CMD%/*}" >> "$GITHUB_PATH"
      - name: Run goreleaser
        if: steps.existing_release.outputs.skip != 'true'
        # goreleaser/goreleaser-action@v7
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94
        with:
          version: "v2.17.0"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify published release assets
        if: steps.existing_release.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' > "$RUNNER_TEMP/trove-release-assets.txt"

          missing=0
          while IFS= read -r asset; do
            if ! grep -Fxq "$asset" "$RUNNER_TEMP/trove-release-assets.txt"; then
              echo "::error::Published release $TAG is missing expected asset: $asset"
              missing=1
            fi
          done < "$RUNNER_TEMP/trove-expected-release-assets.txt"

          if [ "$missing" -ne 0 ]; then
            echo "::error::Release $TAG was published without its complete artifact set."
            exit 1
          fi
      - name: Attest release archives and SBOMs
        if: steps.existing_release.outputs.skip != 'true'
        # actions/attest@v4
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6
        with:
          subject-checksums: ./dist/checksums.txt
      - name: Attest container images
        if: steps.existing_release.outputs.skip != 'true'
        # actions/attest@v4
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6
        with:
          subject-checksums: ./dist/digests.txt
