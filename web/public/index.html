<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>Trove</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='13' font-size='14'>📦</text></svg>" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="wrap">
    <header>
      <h1>TROVE</h1>
      <span class="tagline">read-only service catalog</span>
      <div class="status-line">
        <span id="updated">connecting…</span>
        <span class="pulse" id="pulse" title="live"></span>
      </div>
    </header>

    <div class="error-banner" id="error"></div>

    <div class="summary" id="summary"></div>

    <div class="filterbar">
      <input id="q" type="search" placeholder="filter by name, image, host, label…  ( / )"
             autocomplete="off" spellcheck="false" aria-label="Filter services" />
      <div class="chips" id="chips"></div>
    </div>

    <div class="section-title">Agents</div>
    <div class="agents" id="agents"></div>

    <div class="section-title">Services</div>
    <div id="hosts"></div>

    <div class="section-title">Recent activity</div>
    <div class="events" id="events"></div>

    <footer>
      Trove &middot; read-only by design &middot; auto-refresh 10s &middot;
      <kbd>/</kbd> filter &middot; <kbd>j</kbd>/<kbd>k</kbd> move &middot;
      <kbd>enter</kbd> details &middot; <kbd>esc</kbd> close
    </footer>
  </div>

  <aside id="drawer" class="drawer" hidden aria-label="Service details"></aside>

  <script src="app.js"></script>
</body>
</html>
