# goreleaser v2 config. Tag vX.Y.Z + push -> binaries, archives, checksums,
# and multi-arch images on GHCR. Validate locally with:
#   go run github.com/goreleaser/goreleaser/v2@v2.17.0 release --snapshot --clean
version: 2

project_name: trove

builds:
  - id: trove-server
    main: ./cmd/trove-server
    binary: trove-server
    env: [CGO_ENABLED=0]
    goos: [linux]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags: ["-s -w -X main.version={{.Version}}"]
  - id: trove-agent-docker
    main: ./cmd/trove-agent-docker
    binary: trove-agent-docker
    env: [CGO_ENABLED=0]
    goos: [linux]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags: ["-s -w -X main.version={{.Version}}"]
  - id: trove-agent-k8s
    main: ./cmd/trove-agent-k8s
    binary: trove-agent-k8s
    env: [CGO_ENABLED=0]
    goos: [linux]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags: ["-s -w -X main.version={{.Version}}"]
  - id: trove-agent-proxmox
    main: ./cmd/trove-agent-proxmox
    binary: trove-agent-proxmox
    env: [CGO_ENABLED=0]
    goos: [linux]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags: ["-s -w -X main.version={{.Version}}"]
  - id: trove-agent-local
    main: ./cmd/trove-agent-local
    binary: trove-agent-local
    env: [CGO_ENABLED=0]
    goos: [linux]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags: ["-s -w -X main.version={{.Version}}"]

archives:
  - id: trove-server
    ids: [trove-server]
    name_template: "trove-server_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    # Ship the systemd unit alongside the binary so the bare-metal install in
    # docs/README ("cp deploy/systemd/trove-server.service ...") works from the
    # extracted archive — same as the trove-agent-local archive below.
    files: [LICENSE, README.md, deploy/systemd/trove-server.service]
  - id: trove-agent-docker
    ids: [trove-agent-docker]
    name_template: "trove-agent-docker_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files: [LICENSE]
  - id: trove-agent-k8s
    ids: [trove-agent-k8s]
    name_template: "trove-agent-k8s_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files: [LICENSE]
  - id: trove-agent-proxmox
    ids: [trove-agent-proxmox]
    name_template: "trove-agent-proxmox_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files: [LICENSE]
  - id: trove-agent-local
    ids: [trove-agent-local]
    name_template: "trove-agent-local_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files: [LICENSE, deploy/systemd/trove-agent-local.service]

checksum:
  name_template: "checksums.txt"

sboms:
  - id: release-archives
    artifacts: archive
    documents: ["{{ .ArtifactName }}.sbom.spdx.json"]

docker_digest:
  name_template: "digests.txt"

# One buildx invocation per image publishes the amd64/arm64 OCI index directly.
# BuildKit attaches its SPDX SBOM and provenance attestations to each index.
dockers_v2:
  - id: trove-server
    ids: [trove-server]
    dockerfile: build/docker/Dockerfile.server
    images: ["ghcr.io/techdox/trove-server"]
    tags: ["{{ .Version }}", latest]
    platforms: [linux/amd64, linux/arm64]
    sbom: true
    annotations:
      "org.opencontainers.image.description": "Trove read-only service catalogue server"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.source": "{{ .GitURL }}"
      "org.opencontainers.image.version": "{{ .Version }}"
  - id: trove-agent-docker
    ids: [trove-agent-docker]
    dockerfile: build/docker/Dockerfile.agent-docker
    images: ["ghcr.io/techdox/trove-agent-docker"]
    tags: ["{{ .Version }}", latest]
    platforms: [linux/amd64, linux/arm64]
    sbom: true
    annotations:
      "org.opencontainers.image.description": "Trove read-only Docker collector"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.source": "{{ .GitURL }}"
      "org.opencontainers.image.version": "{{ .Version }}"
  - id: trove-agent-k8s
    ids: [trove-agent-k8s]
    dockerfile: build/docker/Dockerfile.agent-k8s
    images: ["ghcr.io/techdox/trove-agent-k8s"]
    tags: ["{{ .Version }}", latest]
    platforms: [linux/amd64, linux/arm64]
    sbom: true
    annotations:
      "org.opencontainers.image.description": "Trove read-only Kubernetes collector"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.source": "{{ .GitURL }}"
      "org.opencontainers.image.version": "{{ .Version }}"
  - id: trove-agent-proxmox
    ids: [trove-agent-proxmox]
    dockerfile: build/docker/Dockerfile.agent-proxmox
    images: ["ghcr.io/techdox/trove-agent-proxmox"]
    tags: ["{{ .Version }}", latest]
    platforms: [linux/amd64, linux/arm64]
    sbom: true
    annotations:
      "org.opencontainers.image.description": "Trove read-only Proxmox collector"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.source": "{{ .GitURL }}"
      "org.opencontainers.image.version": "{{ .Version }}"

changelog:
  sort: asc
  filters:
    exclude: ["^docs:", "^chore:", "^ci:"]

release:
  # docker_digest is generated during the publish phase but is not an
  # uploadable artifact unless it is explicitly added to the release.
  extra_files:
    - glob: ./dist/digests.txt
  # Preserve the exact tagged commit in GitHub release metadata. Release Please
  # uses that reference to identify the latest release boundary.
  target_commitish: "{{ .Commit }}"
  footer: |
    **Container images** (multi-arch, amd64 + arm64):
    - `ghcr.io/techdox/trove-server:{{ .Version }}`
    - `ghcr.io/techdox/trove-agent-docker:{{ .Version }}`
    - `ghcr.io/techdox/trove-agent-k8s:{{ .Version }}`
    - `ghcr.io/techdox/trove-agent-proxmox:{{ .Version }}`

    The bare-metal agent (`trove-agent-local`) ships as a binary archive above —
    it reads the host's systemd, so it isn't containerized.

snapshot:
  version_template: "{{ incpatch .Version }}-dev"
