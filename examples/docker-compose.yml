# Trove quickstart — server + a Docker agent watching this host, using the
# published images. No cloning or building required.
# Set TROVE_VERSION in .env to pin both services to one release or preview tag.
#
#   1. Generate a token for this host's agent and save it to .env (Compose
#      loads .env automatically, and it survives restarts/upgrades — an
#      `export` would be lost in a new shell):
#        umask 077
#        echo "TROVE_TOKEN=trove_$(openssl rand -hex 24)" > .env
#   2. Start the stack:
#        docker compose up -d
#   3. Open http://localhost:8080 — your containers appear within ~30s.
#
# The TROVE_BOOTSTRAP_* pair below seeds the agent on first start so there is
# no manual token step. To add agents on OTHER hosts later, mint each one its
# own token with:
#        docker compose exec server trove-server agent create <name>
#
# ⚠ The dashboard is open unless you configure OIDC — keep port 8080 on a trusted
#   network (LAN/VPN), enable TROVE_OIDC_*, or put it behind auth.

services:
  server:
    image: ghcr.io/techdox/trove-server:${TROVE_VERSION:-latest}
    environment:
      TROVE_BOOTSTRAP_AGENT: "docker-local"
      TROVE_BOOTSTRAP_TOKEN: "${TROVE_TOKEN:?generate one first with a restrictive umask; see the file header}"
    ports:
      - "8080:8080"
    volumes:
      - trove-data:/data
    restart: unless-stopped

  agent:
    image: ghcr.io/techdox/trove-agent-docker:${TROVE_VERSION:-latest}
    environment:
      TROVE_SERVER_URL: "http://server:8080"
      TROVE_TOKEN: "${TROVE_TOKEN}"
    volumes:
      # Read-only socket mount; the agent only ever issues GETs to Docker.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  trove-data:
