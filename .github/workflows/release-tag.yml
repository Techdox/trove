name: release-tag

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  tag-release:
    name: tag release from release-please manifest
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v7
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check whether release manifest changed
        id: changed
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files=$(git diff --name-only "$BEFORE" "$AFTER")
          if printf '%s\n' "$changed_files" | grep -Fxq '.release-please-manifest.json'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      # Parse repository-controlled data before any release credential is
      # present. Isolated mode prevents imports from the checked-out tree.
      - name: Read release version
        id: version
        if: steps.changed.outputs.changed == 'true'
        run: |
          set -euo pipefail

          version=$(python3 -I - <<'PY'
          import json
          with open('.release-please-manifest.json', 'r', encoding='utf-8') as f:
              manifest = json.load(f)
          version = manifest.get('.')
          if not isinstance(version, str):
              raise SystemExit('manifest does not contain package "."')
          print(version)
          PY
          )
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release manifest contains an invalid version."
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create release tag
        if: steps.changed.outputs.changed == 'true'
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          if [ -z "${RELEASE_PLEASE_TOKEN}" ]; then
            echo "::error::RELEASE_PLEASE_TOKEN is required to create release tags that trigger release.yml."
            exit 1
          fi

          tag="v${VERSION}"

          git fetch origin "refs/tags/${tag}:refs/tags/${tag}" 2>/dev/null || true
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            existing=$(git rev-list -n 1 "refs/tags/${tag}")
            if [ "$existing" = "$GITHUB_SHA" ]; then
              echo "${tag} already points at ${GITHUB_SHA}; nothing to do."
              exit 0
            fi
            echo "::error::${tag} already exists at ${existing}, not ${GITHUB_SHA}. Refusing to move it."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "release ${tag}" "$GITHUB_SHA"
          git push "https://x-access-token:${RELEASE_PLEASE_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "refs/tags/${tag}"

          echo "Created ${tag} at ${GITHUB_SHA}. The Release workflow will publish artifacts from this tag."

      - name: Mark the merged release PR as tagged
        if: steps.changed.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          set -euo pipefail

          # release-please refuses to open the NEXT release PR while a merged
          # one is still labelled "autorelease: pending" ("untagged, merged
          # release PRs outstanding"). With skip-github-release it never flips
          # that label itself — it expects whatever tags the release to do it.
          # Since we just created the tag above, close the loop here. Without
          # this, every release gets stuck after the first.
          gh label create "autorelease: tagged" --color 00FF00 \
            --description "release-please: this release PR has been tagged/released" 2>/dev/null || true

          prs=$(gh pr list --repo "$GITHUB_REPOSITORY" --state merged \
            --label "autorelease: pending" --json number --jq '.[].number')
          if [ -z "$prs" ]; then
            echo "No merged release PR labelled 'autorelease: pending'; nothing to relabel."
          fi
          for pr in $prs; do
            echo "Marking PR #${pr} as autorelease: tagged"
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/issues/${pr}/labels/autorelease%3A%20pending"
            gh api --method POST "repos/${GITHUB_REPOSITORY}/issues/${pr}/labels" \
              --field labels[]="autorelease: tagged"
          done
